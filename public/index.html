<!DOCTYPE html>
<html lang="pt-br" class="font-Inter tracking-[.6px]">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style-tailwind.css">
        <link rel="stylesheet" href="css/login-register.css">
        <title>Fintech | Entrar</title>
    </head>
    <body class="w-full bg-background-light dark:bg-background-dark content-center flex flex-col justify-center items-center gap-10">
        <header>
            <h1 class="text-text-primary-light dark:text-text-primary-dark">
                <figure class="flex justify-center items-center gap-2">
                    <img src="images/logo.png" alt="Logo da Fintech">
                    <figcaption class="text-display font-bold">Fintech</figcaption>
                </figure>
            </h1>
        </header>
        <main class="p-10 bg-surface-light dark:bg-surface-dark flex flex-col justify-center items-center gap-10">
            <h2 class="text-text-primary-light dark:text-text-primary-dark text-title font-medium">Acesse sua conta</h2>
            <form action="" method="" class="w-full">
                <fieldset class="flex flex-col gap-5">
                    <div class="flex flex-col gap-1.5">
                        <label for="inpEmail" class="text-text-secondary-light dark:text-text-secondary-dark">E-mail</label>
                        <input type="text" id="inpEmail" name="email" class="h-10 border border-solid border-border-light dark:border-border-dark text-text-muted-light dark:text-text-muted-dark" placeholder="seu-email@email.com" required>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label for="inpPassword" class="text-text-secondary-light dark:text-text-secondary-dark">Senha</label>
                        <input type="password" id="inpPassword" name="password" class="h-10 border border-solid border-border-light dark:border-border-dark text-text-muted-light dark:text-text-muted-dark" placeholder="••••••••" required>
                        <a href="#" title="Recuperar senha da sua conta" class="underline text-text-muted-light dark:text-text-muted-dark text-tiny font-normal">Esqueci minha senha</a>
                    </div>
                </fieldset>
                <button type="submit" class="w-full h-10 mt-10 bg-success text-text-primary-dark cursor-pointer">Entrar</button>
            </form>
            <p class="text-text-primary-light dark:text-text-primary-dark text-tiny font-normal">
                Ainda não tem uma conta? <a href="register.html" title="Criar a sua conta" class="underline">Cadastre-se</a>.
            </p>
        </main>
    </body>
</html>
